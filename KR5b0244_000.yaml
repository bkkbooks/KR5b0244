body:
  text: 淨天地呪淨壇啓白香騰瑞靄溶溶遍滿於太虛人秉精誠翼翼敢違於咫尺恭焚寶香上啓供養東嶽泰山青帝廣生帝君東嶽天齊大生仁聖帝九天司命上卿真君上殿至聖威雄炳靈仁惠王東嶽淑明皇后護國西齊大王蓬玄空洞洞天仙官長白山儲副仙官梁父山儲副仙官聖嗣祐靈侯惠靈侯靜鑑大師宣靈侯四嶽四天聖帝左右上相張康二大聖顯應千聖小王地府崔府君蒿里文人增福相公昭惠靈顯王護國顯應王清源妙道真君義勇武安王崇寧真君護國嘉應公㴎河靈𣲖侯六部尚書善部尚書惡部尚書六曹卿監鎮殿二將軍左右金吾衛將軍三元吳客三侯真君左右二闕神白騾大王地祇主令溫元帥地祇院九大元帥追魂朱太尉協真侯劉元帥七十五司判官二十四案主者三十六洞天仙官七十二福地仙官靖廬福地治化仙官岱嶽朝班聖衆今年太歲神君靈濟侯髙都督天下都大城隍主者九州社令神祇年月日時四直功曹屬府州縣祀典廟貌神祇悉仗真香普同供養香乃紫虛鬱秀靈風聚煙香雲密羅徑御洞天當願香官使者為臣通奏上聞帝前令臣所啓咸賜如言入意具諸情悃巳露敷宣伏望雲擁旌旗離虎關而下邁風清警蹕聽鸞輅之和鳴森羅百辟以驂隨環列千官而扈從齊臨塵陋俯察精純今則蘭場潔備寶炷濃熏對越聖真宣揚懴法稽首皈依無極大道舉三皈依志心皈依十方道寶當願衆生起心回向一切信禮志心皈依十方經寶當願衆生心開悟解受持轉誦志心皈依十方師寶當願衆生普上法橋無有障礙啓白臣聞渾淪未判渺一氣以無垠髙下既陳奠三才而有象地爰分於五嶽權莫重於泰山標雄齊魯之邦作鎮角亢之分虞朝嵗狩禮重燔柴周世時巡禮嚴用幣是宗是仰無比無倫恭惟東嶽天齊大生仁聖帝應乎造化生於混沌之初立自隂陽鎮彼幅員之域與天齊久大德曰生仁以得仁體乾元之發育聖而益聖居泰岱之岧嶤五方端處於東方三界獨尊於中界奉行天令宰御隂司阿閣石間維神居之淵默金篋玉䇿知人壽之短長設七十五司以掌權衡有三十六獄以懲凶惡永綏邦社大庇民區國家致祭於歲時率土來朝於春月聰明正直有欲必從氣焰威靈無遠弗屇凡伸祈禱諒沐慈憐是以潔蓬蓽之塵居建香花之法會拜手稽首具瞻咫尺之威容皈命投誠期滌萬生之罪垢洋乎如在感而遂通法衆虔誠稱揚讃詠衆誦仰啓天齊仁聖帝五嶽最巨岱為宗分掌世界人間事氣鍾神秀儼居東截彼泰山髙且大四千九百丈淩空山頂名為太平頂捨身臺與介丘峯仁安殿宇琉璃瑩冠冕巍然御正中上古帝王修封禪升中告代勒成功七十二君名具列始自軒轅得上封碑碣猶存秦篆刻水池東列大夫松唐皇鏤刻沉香像宋室建置會真宫國朝混一加尊禮大生二字侈褒崇至仁至聖為民極時雨時暘相歲豐傾倒虔恭皈命請遙瞻雲闕禮慈容和不可思議功德舉三信禮信禮髙上九氣天中東方靈寶天尊信禮髙上九氣天中青靈始老天尊信禮髙上九氣天中東華上相天尊臣聞嶽居巽艮之間主司考校人處乾坤之內動結愆尤嚴簡册以必書雖毫分而無失伏念求懴弟子某等浮生寄世托廕為人身體髮膚受之父母耳目鼻口全爾形神是為萬物之靈均稟五行之秀經年纍月積日踰時過咎若於丘山善念微於塵露罪根難滅惡貫易盈不知禳謝之門莫曉首陳之路靜思其故何以自文兹悔過以省愆庸俯躬而請命謹涓榖旦傾向葵誠爐焚芬馥之清香燭乘輝煌之朱焰扣鍾擊磬聲相應於步虛酌水獻花禮不逾於誠實祭效西鄰之禴拜投東嶽之尊用贖前非期消宿業敬憑懴悔並乞宥原法衆虔誠皈依讃禮舉人各恭敬衆和各一拜志心朝禮統御東方尊臨泰嶽青靈儲粹儼然石像之威嚴玉册進封加以帝君之諡號廣生褒美亘古垂休大悲大願大聖大慈東嶽泰山青帝廣生帝君志心朝禮含德體仁鎮兹東夏岱宗稱長純三宫空洞之天福地推權治鬼神考謫之府祀爰崇於帝制位乃主於玄枵大悲大願大聖大慈東嶽天齊大生仁聖帝志心朝禮自幼捨家遍遊參訪受太一天尊之記得道沖升降司命真君之名同僉紏察居治霍山司命府渙膺東嶽上卿封大悲大願大聖大慈九天司命上卿賜福佑聖真君志心朝禮氣孕嶽靈裔流天泒坤元合德備仁孝以兼全帝夢傳宗謂威雄之可愛為儲宫之主器受王爵之疏封大悲大願大聖大慈上殿至聖威雄炳靈仁惠王志心朝禮東嶽淑明皇后志心朝禮護國西齊大王志心朝禮蓬玄空洞洞天仙官志心朝禮長白山儲副仙官志心朝禮梁父山儲副仙官志心朝禮聖嗣祐靈侯志心朝禮聖嗣惠靈侯志心朝禮聖嗣靜鑑大師志心朝禮聖嗣宣靈侯志心朝禮南嶽司天大化昭聖帝志心朝禮西嶽金天大利順聖帝志心朝禮北嶽安天大真玄聖帝志心朝禮中嶽中天大寧崇聖帝衆誦呪青玄真布元品洞靈扶桑總衛始生元英丹林散明育質生英混合玄景消制魔羣志心朝禮奄有大東東嶽天齊大生仁聖帝志心朝禮羣嶽之長東嶽天齊大生仁聖帝志心朝禮峻極于天東嶽天齊大生仁聖帝志心朝禮齊同慈愛東嶽天齊大生仁聖帝志心朝禮含弘光大東嶽天齊大生仁聖帝志心朝禮覆被羣生東嶽天齊大生仁聖帝志心朝禮一視同仁東嶽天齊大生仁聖帝志心朝禮惟睿作聖東嶽天齊大生仁聖帝志心朝禮尊號為帝東嶽天齊大生仁聖帝禮足各長跪皈命懴悔臣法衆等志心皈神皈身皈命東嶽泰山廣生帝君天齊大生仁聖帝九天司命真君至聖炳靈王岱嶽朝班真宰一切威靈臣聞嶽爾真形兀若尊安之勢身為大幻寧無踐履之乖恭望聖慈洞垂巨澤普降洪恩懴悔今辰信士某等億劫以來立身之後戴天履地負隂抱陽蟻聚而居蠅營是務周旋進退無片善之可書出入起居聚百非而弗覺或觸突於衆聖或羸露於三光背禮而行非義而動髙車大馬馳騁於名利之途細葛輕裘服玩過奢華之麗行多隱僻分外營求徒受一形罔知三省積成罪咎無量無邊伏願衆聖流恩羣真錫祉以仁及物解身業之縈纒保命延年俾罪山之摧弭更祈洪廕均及含生臣等志心稽首禮謝無上至真道寶大聖道寶天尊皈依無上道大羅三境尊懴悔諸善信願消身業愆四非皆克去見善日能遷撿身若不及福祿自延年消除身業天尊呪盛德在木上應歲星五嶽之祖天帝之孫日在於東為天之門靄郁紛紛喜氣絪緼志心朝禮在東象日東嶽天齊大生仁聖帝志心朝禮四嶽所宗東嶽天齊大生仁聖帝志心朝禮溥博如天東嶽天齊大生仁聖帝志心朝禮九氣齊并東嶽天齊大生仁聖帝志心朝禮大而化之東嶽天齊大生仁聖帝志心朝禮好生惡殺東嶽天齊大生仁聖帝志心朝禮薰然慈仁東嶽天齊大生仁聖帝志心朝禮聰明聖智東嶽天齊大生仁聖帝志心朝禮合地曰帝東嶽天齊大生仁聖帝禮足各長跪皈命懴悔臣法衆等志心皈身皈神皈命東嶽泰山廣生帝君天齊大生仁聖帝九天司命真君至聖炳靈王岱嶽朝班真宰一切威靈臣聞維嶽降靈大闡慈悲之造舉心運念即為禍福之門恭望聖慈洞垂巨澤普降恩休懴悔某爰從往昔以迄于今六鑿相攘七情不節巧生計較恣起貪婪欲縱所之肆荒淫而無度德忘攸好唯富貴之是求放僻邪侈無弗為忿懥恐懼不得正護己之短挫人所長妬賢嫉能自昧靈臺而罔覺淩孤弱寡素為暗室之可欺以偽雜真得新忘故慒然方寸未悟九思結釁滋多難名難述伏願聖帝垂慈真靈洞鑒上孚仁意赦諸心業之愆下遂人情熙若春臺之樂更祈洪廕均及含生臣等志心稽首禮謝無上正真經寶大聖經寶天尊皈依無上經三十六部尊懴悔諸善信願消心業愆常清亦常靜自然欲不生內外俱貞白永保道心寧消除心業天尊衆誦呪巖巖泰山總制羣靈受天明命主宰人倫其位則東其德則仁萬物資始功濟生民志心朝禮盛於東方東嶽天齊大生仁聖帝志心朝禮冠五嶽首東嶽天齊大生仁聖帝志心朝禮維天則靈東嶽天齊大生仁聖帝志心朝禮變化齊一東嶽天齊大生仁聖帝志心朝禮能成其大東嶽天齊大生仁聖帝志心朝禮與生俱生東嶽天齊大生仁聖帝志心朝禮顯仁藏用東嶽天齊大生仁聖帝志心朝禮乃聖乃仁東嶽天齊大生仁聖帝志心朝禮以德而帝東嶽天齊大生仁聖帝禮足各長跪皈命懴悔臣法衆等至心皈身皈神皈命東嶽泰山廣生帝君天齊大生仁聖帝九天司命真君至聖炳靈王岱嶽朝班真宰一切威靈臣聞嶽鎮山川妙無聲而無臭口宣言語多有是以有非恭望聖慈洞垂巨澤普降洪恩懴悔某等粵自宿生至于今日華言綺語利口惡聲闊論髙談狂歌浪笑沉酣麯蘖從耽樂以無猒食啖葷腥謂肥甘之不足或呵風而叱雨或怨暑以咨寒慢道諂神輕儒毀釋掉三寸舌咨離間於六親欺一片心鬪是非於兩處華言惑衆誇富欺貧每憑駟舌莫謹三緘稔積深愆濯髮難數伏願聖帝矜憐真靈惻憫德音宣布冀口業之蠲除寰宇清寧獲教聲之漸被更祈洪廕均及含生臣等志心稽首禮謝無上正真師寶大聖師寶天尊皈依無上師人天得道尊懴悔諸善信願消口業愆如瓶能謹守一語訂千金言滿無口過皆足清靜音消除口業天尊舉步虛旋行躡雲綱散花臣聞為善為惡固難昧於神明降福降殃乃各司於曹局六合內外萬物洪纎凡有氣形悉歸統𨽻列録過紀功之職設掌生注死之官總括幽明典司民物今求懴信士某等身居塵網生係凡根向平時見義而不為謂小惡無傷而弗去釀成衆罪慮有百殃爰仗至誠仰祈丕應導將來之福祉謝巳往之愆尤稽首皈依虔誠敬禮志心敬禮左右二丞相志心敬禮張康二大聖志心敬禮顯應千聖小王志心敬禮永嘉夫人志心敬禮玉仙娘娘志心敬禮謝恩娘娘志心敬禮地府崔府君志心敬禮蒿里相公志心敬禮增福相公志心敬禮昭惠靈顯王志心敬禮護國嘉應公志心敬禮清源妙道真君志心敬禮義勇武安王崇寧真君志心敬禮護國顯應王志心敬禮㴎河靈𣲖侯志心敬禮六部尚書志心敬禮善部尚書志心敬禮惡部尚書志心敬禮六曹卿監志心敬禮白騾大王志心敬禮左右鎮殿二將軍金吾衛將軍志心敬禮三元吳客三侯真君左右二闕神志心敬禮翊靈昭武使溫元帥志心敬禮順靈昭化使李元帥志心敬禮協靈昭濟使鐡元帥志心敬禮鎮靈昭贊使劉元帥志心敬禮通靈昭佑使楊元帥志心敬禮宣靈昭慶使張元帥志心敬禮廣靈昭惠使康元帥志心敬禮安靈昭應使嶽元帥志心敬禮顯靈昭利使孟元帥志心敬禮永靈昭助使韋元帥志心敬禮追魂朱太尉志心敬禮協真侯劉元帥志心敬禮天曹司地府司判官志心敬禮注祿司長壽司判官志心敬禮子孫司官貟司判官志心敬禮土地司財帛司判官志心敬禮僧道司絲蠶司判官志心敬禮總統司四生司判官志心敬禮城隍司曹吏司判官志心敬禮齋戒司風雨司判官志心敬禮校量司勾願司判官志心敬禮孤魂司地獄司判官志心敬禮疾病司昧心司判官志心敬禮功德司五榖司判官志心敬禮放生司注福司判官志心敬禮山林司孝順司判官志心敬禮修廟司殺生司判官志心敬禮六道司還魂司判官志心敬禮忠直司驛客司判官志心敬禮照正司毒藥司判官志心敬禮水府司看經司判官志心敬禮醫藥司燒香司判官志心敬禮舉意司速報司判官志心敬禮刑戮司隂謀司判官志心敬禮追魂司發汗司判官志心敬禮注死司惡報司判官志心敬禮法水司枉死司判官志心敬禮陳狀司索命司判官志心敬禮推問司平等司判官志心敬禮鰥寡司走獸司判官志心敬禮